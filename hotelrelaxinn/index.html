<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Elite Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; 
            color: white; 
            scroll-behavior: smooth; 
            overflow-x: hidden; 
        }

        /* THE SIGNATURE BLUE GLOW JUMP */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-35px); filter: brightness(1.5) drop-shadow(0 0 30px var(--sky)); }
        }
        .jump-text { 
            font-family: 'Cormorant Garamond', serif; 
            display: flex; 
            justify-content: center; 
            gap: 0.15rem; 
        }
        .jump-text span { 
            display: inline-block; 
            animation: eliteJump 3.5s infinite ease-in-out; 
        }
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }
        .space-block { width: 2.5rem; }

        /* GLASSMORPHISM DESIGN */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.07); 
            transition: 0.5s; 
        }
        .glass:hover { 
            border-color: var(--sky); 
            transform: translateY(-5px); 
        }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4 overflow-hidden">
        <div class="absolute inset-0 z-[-1] brightness-[0.3]">
            <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=1600" class="w-full h-full object-cover">
        </div>
        
        <div class="jump-text text-6xl md:text-[10rem] font-bold italic tracking-tighter leading-none">
            <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
            <div class="space-block"></div>
            <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
            <div class="space-block"></div>
            <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
        </div>
        
        <p class="mt-10 text-zinc-500 uppercase tracking-[1em] text-[8px] md:text-xs font-black">The Apex of Culinary Sophistication</p>
        <a href="#feedback" class="mt-16 px-14 py-5 border border-white/10 rounded-full hover:bg-sky-500 transition-all uppercase tracking-widest text-[10px] font-black inline-block">Leave Feedback</a>
    </header>

    <section id="feedback" class="py-32 px-6 max-w-4xl mx-auto">
        <div class="glass p-12 md:p-20 rounded-[3rem] text-center shadow-2xl relative">
            <h2 class="text-4xl font-bold italic mb-4 uppercase tracking-tighter italic">GUEST <span class="text-sky-400">FEEDBACK</span></h2>
            <p class="text-zinc-500 mb-10 uppercase tracking-[0.5em] text-[10px]">Your experience matters</p>
            
            <div class="flex justify-center gap-4 mb-10">
                <i class="fas fa-star text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]"></i>
                <i class="fas fa-star text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]"></i>
                <i class="fas fa-star text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]"></i>
                <i class="fas fa-star text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]"></i>
                <i class="fas fa-star text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]"></i>
            </div>

            <form action="https://formspree.io/f/xaqlapgv" method="POST" class="space-y-6 text-left">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <input type="text" name="Guest Name" required placeholder="Your Name" 
                               class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none focus:border-sky-500 transition-all text-sm text-white">
                    </div>
                    <div class="space-y-2">
                        <input type="email" name="Email Address" required placeholder="Email Address" 
                               class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none focus:border-sky-500 transition-all text-sm text-white">
                    </div>
                </div>
                <textarea name="Feedback Message" required placeholder="Tell us about your visit..." 
                          class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 outline-none focus:border-sky-500 h-40 transition-all text-sm text-white"></textarea>
                
                <div class="text-center">
                    <button type="submit" class="w-full md:w-auto px-16 py-5 bg-sky-500 text-white font-black rounded-full uppercase text-[10px] tracking-widest hover:bg-sky-400 transition-all">
                        Submit Feedback
                    </button>
                </div>
            </form>
        </div>
    </section>

    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-10 px-12 py-6 glass rounded-full z-[100] border-white/20 shadow-2xl">
        <a href="tel:+918114674620" class="text-xl text-zinc-400 hover:text-sky-400"><i class="fas fa-phone-alt"></i></a>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <a href="https://wa.me/918114674620" class="text-4xl text-green-500 hover:scale-110 transition-transform"><i class="fab fa-whatsapp"></i></a>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <a href="#" class="text-xl text-zinc-400 hover:text-red-500"><i class="fas fa-location-arrow"></i></a>
    </div>

</body>
</html>
