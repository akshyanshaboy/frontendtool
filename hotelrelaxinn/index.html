<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Elite Mobile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* 1. DYNAMIC HOMEPAGE BACKGROUND */
        #hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out, transform 10s linear;
            z-index: -1;
            filter: brightness(0.5) blur(2px);
            transform: scale(1.1);
        }

        /* 2. GLOW JUMP ANIMATION (MOBILE OPTIMIZED) */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-20px); filter: brightness(1.4) drop-shadow(0 0 15px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.1rem; flex-wrap: nowrap; }
        .jump-text span { display: inline-block; animation: eliteJump 3s infinite ease-in-out; }
        .space-block { width: 1rem; }

        /* Staggered Delays */
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        [x-cloak] { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 10px; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4 overflow-hidden">
        <div id="hero-bg"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black"></div>
        
        <div class="relative z-10">
            <div class="jump-text text-5xl md:text-[8rem] font-bold italic tracking-tighter">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
            </div>
            <p class="mt-6 text-zinc-400 uppercase tracking-[0.5em] text-[10px] md:text-sm font-bold">Premium Dining • Bhadrak</p>
            <a href="#menu" class="mt-12 px-10 py-4 border border-white/20 rounded-full hover:bg-sky-500 hover:border-sky-500 transition-all uppercase tracking-widest text-[10px] font-black inline-block">Explore Menu</a>
        </div>
    </header>

    <section id="menu" class="py-20 px-6 bg-[#050505]">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-light italic mb-2">The Signature Menu</h2>
            <div class="h-[1px] w-12 bg-sky-500 mx-auto"></div>
        </div>

        <div class="space-y-6 max-w-2xl mx-auto">
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=1000'; imgTitle = 'Executive Mutton Thali'; imgPrice = '₹280'; desc = 'Our signature slow-cooked mutton served with steaming rice, dalma, and seasonal bhaja.'" 
                 class="glass p-6 rounded-[2rem] flex justify-between items-center group active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=100" class="w-16 h-16 rounded-2xl object-cover border border-white/10" alt="Mutton">
                    <div>
                        <h3 class="font-bold uppercase text-sm tracking-widest">Mutton Thali</h3>
                        <p class="text-zinc-500 text-[10px] uppercase mt-1">Chef's Choice</p>
                    </div>
                </div>
                <span class="font-bold text-sky-400">₹280</span>
            </div>

            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1546833999-b9f581a1996d?q=80&w=1000'; imgTitle = 'Royal Maharaja Thali'; imgPrice = '₹299'; desc = 'A feast fit for a king. Includes Paneer Butter Masala, Dal Makhani, Mix Veg, and buttery Lacha Paratha.'" 
                 class="glass p-6 rounded-[2rem] flex justify-between items-center group active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1546833999-b9f581a1996d?q=80&w=100" class="w-16 h-16 rounded-2xl object-cover border border-white/10" alt="Veg">
                    <div>
                        <h3 class="font-bold uppercase text-sm tracking-widest">Maharaja Thali</h3>
                        <p class="text-zinc-500 text-[10px] uppercase mt-1">Pure Veg Gold</p>
                    </div>
                </div>
                <span class="font-bold text-sky-400">₹299</span>
            </div>

            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=1000'; imgTitle = 'Smoky Tandoori Chicken'; imgPrice = '₹460'; desc = 'Whole chicken marinated in 12 spices and roasted in our traditional clay oven for a perfect smoky finish.'" 
                 class="glass p-6 rounded-[2rem] flex justify-between items-center group active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=100" class="w-16 h-16 rounded-2xl object-cover border border-white/10" alt="Tandoori">
                    <div>
                        <h3 class="font-bold uppercase text-sm tracking-widest">Tandoori Chicken</h3>
                        <p class="text-zinc-500 text-[10px] uppercase mt-1">Clay Oven Roast</p>
                    </div>
                </div>
                <span class="font-bold text-sky-400">₹460</span>
            </div>
        </div>
    </section>

    <section class="py-20 px-6">
        <h3 class="text-center text-sm tracking-[0.5em] text-zinc-500 uppercase mb-10">The Ambiance</h3>
        <div class="grid grid-cols-2 gap-4">
            <img @click="open = true; imgSrc = 'https://i.ibb.co/60sfv1rW/interior.jpg'; imgTitle = 'The Dining Hall'; imgPrice = 'Elite'; desc = 'Experience luxury dining with premium interiors at Hotel Relax Inn.'" 
                 src="https://i.ibb.co/60sfv1rW/interior.jpg" class="h-60 w-full object-cover rounded-[2rem] border border-white/10 shadow-2xl">
            <img @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?q=80&w=1000'; imgTitle = 'Kitchen Fresh'; imgPrice = 'Purity'; desc = 'Only the freshest ingredients make it to our royal kitchen.'" 
                 src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?q=80&w=1000" class="h-60 w-full object-cover rounded-[2rem] border border-white/10 shadow-2xl">
        </div>
    </section>

    <section class="py-20 px-6 max-w-lg mx-auto">
        <div class="glass p-10 rounded-[3rem] text-center">
            <h2 class="text-2xl font-bold italic mb-8">Guest Review</h2>
            <div class="flex justify-center gap-4 mb-8" x-data="{ r: 0 }">
                <template x-for="i in [1,2,3,4,5]">
                    <i @click="r = i" class="fas fa-star text-3xl cursor-pointer transition-all" :class="i <= r ? 'text-sky-400 scale-110' : 'text-zinc-800'"></i>
                </template>
            </div>
            <textarea placeholder="Your experience..." class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white h-24 mb-6 outline-none focus:border-sky-500"></textarea>
            <button class="w-full py-4 bg-white text-black font-black rounded-full uppercase text-[10px] tracking-widest hover:bg-sky-500 hover:text-white transition-all">Submit Feedback</button>
        </div>
    </section>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-6 px-8 py-4 glass rounded-full z-[100] shadow-2xl border-white/20">
        <a href="tel:+918114674620" class="text-xl hover:text-sky-400"><i class="fas fa-phone"></i></a>
        <div class="h-6 w-[1px] bg-white/20"></div>
        <a href="https://wa.me/918114674620" class="text-3xl text-green-500 hover:scale-110 transition-transform"><i class="fab fa-whatsapp"></i></a>
        <div class="h-6 w-[1px] bg-white/20"></div>
        <a href="https://maps.app.goo.gl/YourLinkHere" target="_blank" class="text-xl hover:text-red-500"><i class="fas fa-map-marker-alt"></i></a>
    </div>

    <div x-show="open" x-cloak 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-10"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="fixed inset-0 z-[200] flex items-end md:items-center justify-center bg-black/90 backdrop-blur-xl" @click.away="open = false">
        
        <div class="relative w-full max-w-lg bg-[#111] rounded-t-[3rem] md:rounded-[3rem] overflow-hidden border-t border-white/10 md:border">
            <button @click="open = false" class="absolute top-6 right-6 text-zinc-500 text-3xl"><i class="fas fa-times-circle"></i></button>
            <img :src="imgSrc" class="w-full h-64 object-cover" alt="Detail">
            <div class="p-10">
                <span class="text-sky-400 font-bold tracking-widest text-[10px] uppercase">Hotel Relax Inn</span>
                <h3 class="text-3xl font-bold italic mt-2 uppercase" x-text="imgTitle"></h3>
                <p class="text-zinc-500 mt-4 text-sm leading-relaxed" x-text="desc"></p>
                <div class="mt-8 flex justify-between items-center">
                    <span class="text-4xl font-bold" x-text="imgPrice"></span>
                    <a href="tel:+918114674620" class="px-6 py-3 bg-white text-black text-[10px] font-black rounded-full uppercase">Order Now</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // BACKGROUND ROTATOR
        const images = [
            'https://i.ibb.co/60sfv1rW/interior.jpg',
            'https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=1000',
            'https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=1000'
        ];
        let current = 0;
        const bg = document.getElementById('hero-bg');
        
        function rotateBg() {
            bg.style.backgroundImage = `url('${images[current]}')`;
            current = (current + 1) % images.length;
        }
        
        rotateBg();
        setInterval(rotateBg, 5000);
    </script>

</body>
</html>
