<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Master Elite Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* BACKGROUND ROTATION */
        #hero-bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.25) contrast(1.2);
            transition: background-image 2s ease-in-out;
        }

        /* PREMIUM JUMP ANIMATION */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-30px); filter: brightness(1.3) drop-shadow(0 0 25px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.15rem; }
        .jump-text span { display: inline-block; animation: eliteJump 3.5s infinite ease-in-out; }
        .space-block { width: 3.5rem; }
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        /* GLASSMORPHISM */
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .glass:hover { 
            border-color: var(--sky); 
            background: rgba(14, 165, 233, 0.05); 
            transform: translateY(-10px); 
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 10px; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <div id="hero-bg"></div>

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="relative z-10">
            <div class="jump-text text-7xl md:text-[12rem] font-bold italic tracking-tighter leading-none mb-12">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
            </div>
            <p class="mt-10 text-zinc-200 uppercase tracking-[1.5em] text-[14px] md:text-2xl font-extrabold">
                The Apex of Culinary Sophistication
            </p>
            <a href="#menu" class="mt-24 px-20 py-7 border border-white/20 rounded-full hover:bg-sky-500 hover:border-sky-500 transition-all uppercase tracking-[0.5em] text-[12px] font-black inline-block">Discover The Menu</a>
        </div>
    </header>

    <section id="menu" class="py-40 px-6 max-w-7xl mx-auto" x-data="{ tab: 'tandoor' }">
        <div class="text-center mb-24">
            <h2 class="text-6xl font-bold italic mb-12 uppercase tracking-tighter">The <span class="text-sky-400">Curated</span> Menu</h2>
            <div class="flex flex-wrap justify-center gap-12 border-b border-white/5 pb-8">
                <button @click="tab = 'mutton'" :class="tab === 'mutton' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-[0.3em] text-[11px] font-black transition-all">Mutton</button>
                <button @click="tab = 'veg'" :class="tab === 'veg' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-[0.3em] text-[11px] font-black transition-all">Vegetarian</button>
                <button @click="tab = 'tandoor'" :class="tab === 'tandoor' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-[0.3em] text-[11px] font-black transition-all">Tandoor & Starters</button>
            </div>
        </div>

        <div x-show="tab === 'tandoor'" x-transition:enter="transition duration-500" class="grid md:grid-cols-3 gap-8">
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=1000'; imgTitle = 'Chicken Tikka'; imgPrice = '₹260'; desc = 'Smokey, tender chicken marinated in hand-ground spices.'" class="glass p-8 rounded-[3rem] cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=600" class="w-full h-56 object-cover rounded-[2.5rem] mb-8 group-hover:scale-105 transition-all">
                <h3 class="text-2xl font-bold uppercase">Chicken Tikka</h3>
                <span class="text-sky-400 text-2xl font-black block mt-6">₹260</span>
            </div>
            </div>
    </section>

    <section id="gallery" class="py-40 bg-zinc-950/50 backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl md:text-7xl font-black uppercase tracking-[0.8em] text-white mb-24 italic opacity-80">
                The Visual Journey
            </h2>
            <div class="columns-1 md:columns-3 gap-6 space-y-6">
                <div class="glass p-3 rounded-[2.5rem] overflow-hidden"><img src="https://i.ibb.co/60sfv1rW/interior.jpg" class="rounded-[2rem] w-full"></div>
                <div class="glass p-3 rounded-[2.5rem] overflow-hidden"><img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=800" class="rounded-[2rem] w-full"></div>
                <div class="glass p-3 rounded-[2.5rem] overflow-hidden"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=80&w=800" class="rounded-[2rem] w-full"></div>
            </div>
        </div>
    </section>

    <section id="feedback" class="py-40 px-6 max-w-5xl mx-auto">
        <div class="glass p-16 md:p-24 rounded-[5rem] text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-sky-500 to-transparent"></div>
            <h2 class="text-5xl font-bold italic mb-10 uppercase">Guest <span class="text-sky-400">Feedback</span></h2>
            <p class="text-zinc-500 mb-16 tracking-widest text-xs uppercase">We value your experience</p>
            
            <form class="space-y-8" action="#" method="POST">
                <div class="grid md:grid-cols-2 gap-8">
                    <input type="text" placeholder="Name" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 outline-none focus:border-sky-500 transition-all text-sm font-bold">
                    <input type="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 outline-none focus:border-sky-500 transition-all text-sm font-bold">
                </div>
                
                <div class="flex justify-center gap-4 py-4" x-data="{ rating: 5 }">
                    <template x-for="i in 5">
                        <i @click="rating = i" 
                           class="fas fa-star text-3xl cursor-pointer transition-all" 
                           :class="i <= rating ? 'text-sky-400 drop-shadow-[0_0_10px_#0ea5e9]' : 'text-zinc-800'"></i>
                    </template>
                </div>

                <textarea placeholder="Share your thoughts..." required class="w-full bg-white/5 border border-white/10 rounded-[2.5rem] p-8 outline-none focus:border-sky-500 h-48 transition-all text-sm font-bold"></textarea>
                
                <button type="submit" class="px-24 py-7 bg-white text-black font-black rounded-full uppercase text-[11px] tracking-[0.4em] hover:bg-sky-500 hover:text-white transition-all">
                    Submit Experience
                </button>
            </form>
        </div>
    </section>

    <div class="fixed bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-12 px-14 py-7 glass rounded-full z-[100] border-white/20 shadow-2xl">
        <a href="tel:+918114674620" class="text-2xl text-zinc-400 hover:text-sky-400 transition-all"><i class="fas fa-phone-alt"></i></a>
        <div class="h-10 w-[1px] bg-white/10"></div>
        <a href="https://wa.me/918114674620" class="text-5xl text-green-500 hover:scale-125 transition-transform"><i class="fab fa-whatsapp"></i></a>
        <div class="h-10 w-[1px] bg-white/10"></div>
        <a href="#" class="text-2xl text-zinc-400 hover:text-red-500 transition-all"><i class="fas fa-map-marker-alt"></i></a>
    </div>

    <script>
        const images = [
            'https://i.ibb.co/60sfv1rW/interior.jpg',
            'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1200',
            'https://images.unsplash.com/photo-1559339352-11d035aa65de?q=80&w=1200'
        ];
        let cur = 0;
        const bg = document.getElementById('hero-bg');
        function rotate() {
            bg.style.backgroundImage = `url('${images[cur]}')`;
            cur = (cur + 1) % images.length;
        }
        rotate(); setInterval(rotate, 7000);
    </script>
</body>
</html>
