<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | The Full Elite Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* HERO BG ROTATION */
        #hero-bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.3) contrast(1.1);
            transition: background-image 2s ease-in-out;
        }

        /* THE INSANE GLOW JUMP */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-35px); filter: brightness(1.5) drop-shadow(0 0 30px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.15rem; }
        .jump-text span { display: inline-block; animation: eliteJump 3.5s infinite ease-in-out; }
        .space-block { width: 2.5rem; }
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        /* GLASS DESIGN */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.07); transition: 0.5s; }
        .glass:hover { border-color: var(--sky); background: rgba(255, 255, 255, 0.07); transform: translateY(-5px); }

        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <div id="hero-bg"></div>

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="relative z-10">
            <div class="jump-text text-6xl md:text-[10rem] font-bold italic tracking-tighter leading-none">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span>
