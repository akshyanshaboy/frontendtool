<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Elite Dining</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* 1. DYNAMIC HOMEPAGE BACKGROUND */
        #hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            z-index: -1;
            filter: brightness(0.4) blur(4px);
        }

        /* 2. GLOW JUMP ANIMATION (STAYING AS REQUESTED) */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-30px); filter: brightness(1.4) drop-shadow(0 0 20px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.15rem; }
        .jump-text span { display: inline-block; animation: eliteJump 3s infinite ease-in-out; }
        .space-block { width: 2rem; }

        /* Staggered Delays */
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); transition: 0.4s; }
        .glass:hover { border-color: var(--sky); background: rgba(255, 255, 255, 0.08); }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4 overflow-hidden">
        <div id="hero-bg"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black"></div>
        
        <div class="relative z-10">
            <div class="jump-text text-5xl md:text-[9rem] font-bold italic tracking-tighter">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
            </div>
            <p class="mt-8 text-zinc-400 uppercase tracking-[0.8em] text-[10px] md:text-sm font-bold">The Royal Taste of Bhadrak</p>
            <a href="#menu" class="mt-12 px-12 py-5 border border-sky-500/30 rounded-full hover:bg-sky-500 transition-all uppercase tracking-widest text-[10px] font-black inline-block">View Our Selection</a>
        </div>
    </header>

    <section id="menu" class="py-24 px-6 max-w-6xl mx-auto" x-data="{ tab: 'mutton' }">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-bold italic mb-6 uppercase tracking-tighter">The <span class="text-sky-400">Master</span> Menu</h2>
            <div class="flex justify-center gap-6 border-b border-white/5 pb-4 overflow-x-auto no-scrollbar">
                <button @click="tab = 'mutton'" :class="
