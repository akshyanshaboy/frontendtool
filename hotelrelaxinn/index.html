<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Elite Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* HERO BG ANIMATION */
        #hero-bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.3) contrast(1.1);
            transition: background-image 2s ease-in-out;
        }

        /* THE ELITE GLOW JUMP */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-35px); filter: brightness(1.5) drop-shadow(0 0 30px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.15rem; }
        .jump-text span { display: inline-block; animation: eliteJump 3.5s infinite ease-in-out; }
        .space-block { width: 3rem; }
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        /* GLASS DESIGN */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.07); transition: 0.5s; }
        .glass:hover { border-color: var(--sky); background: rgba(255, 255, 255, 0.07); transform: translateY(-5px); }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <div id="hero-bg"></div>

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="relative z-10">
            <div class="jump-text text-6xl md:text-[11rem] font-bold italic tracking-tighter leading-none mb-10">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
            </div>
            
            <p class="mt-8 text-zinc-300 uppercase tracking-[1.4em] text-[12px] md:text-xl font-bold opacity-90">
                The Apex of Culinary Sophistication
            </p>

            <a href="#menu" class="mt-20 px-16 py-6 border border-white/10 rounded-full hover:bg-sky-500 hover:border-sky-500 transition-all uppercase tracking-widest text-[12px] font-black inline-block">Explore Full Menu</a>
        </div>
    </header>

    <section id="menu" class="py-32 px-6 max-w-7xl mx-auto" x-data="{ tab: 'tandoor' }">
        <div class="text-center mb-20">
            <h2 class="text-5xl font-bold italic mb-10">Elite <span class="text-sky-400">Selections</span></h2>
            <div class="flex flex-wrap justify-center gap-8 border-b border-white/5 pb-6">
                <button @click="tab = 'mutton'" :class="tab === 'mutton' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-widest text-[10px] font-black transition-colors">Mutton Selection</button>
                <button @click="tab = 'veg'" :class="tab === 'veg' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-widest text-[10px] font-black transition-colors">Royal Vegetarian</button>
                <button @click="tab = 'tandoor'" :class="tab === 'tandoor' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="pb-2 uppercase tracking-widest text-[10px] font-black transition-colors">Tandoor & Starters</button>
            </div>
        </div>

        <div x-show="tab === 'tandoor'" x-transition class="grid md:grid-cols-3 gap-6">
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=1000'; imgTitle = 'Chicken Tikka'; imgPrice = '₹260'; desc = 'Smokey, tender chicken marinated in hand-ground spices.'" class="glass p-6 rounded-[2.5rem] cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1599487488170-d11ec9c175f0?q=80&w=400" class="w-full h-48 object-cover rounded-[2rem] mb-6">
                <h3 class="text-xl font-bold uppercase">Chicken Tikka</h3>
                <span class="text-sky-400 font-bold block mt-4">₹260</span>
            </div>
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1626508035297-0cd27c397d67?q=80&w=1000'; imgTitle = 'Paneer Irani'; imgPrice = '₹210'; desc = 'Creamy paneer kebab with a hint of saffron.'" class="glass p-6 rounded-[2.5rem] cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1626508035297-0cd27c397d67?q=80&w=400" class="w-full h-48 object-cover rounded-[2rem] mb-6">
                <h3 class="text-xl font-bold uppercase">Paneer Irani</h3>
                <span class="text-sky-400 font-bold block mt-4">₹210</span>
            </div>
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1633337474564-1d9478ca4e2e?q=80&w=1000'; imgTitle = 'Seekh Kebab'; imgPrice = '₹320'; desc = 'Succulent minced meat grilled on skewers.'" class="glass p-6 rounded-[2.5rem] cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1633337474564-1d9478ca4e2e?q=80&w=400" class="w-full h-48 object-cover rounded-[2rem] mb-6">
                <h3 class="text-xl font-bold uppercase">Seekh Kebab</h3>
                <span class="text-sky-400 font-bold block mt-4">₹320</span>
            </div>
        </div>
    </section>

    <section id="gallery" class="py-32 bg-white/5">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-3xl md:text-5xl font-bold uppercase tracking-[1em] text-zinc-400 mb-20 italic">
                The Visual Journey
            </h2>
            <div class="columns-1 md:columns-4 gap-4 space-y-4">
                <div class="glass p-2 rounded-[2rem] overflow-hidden"><img src="https://i.ibb.co/60sfv1rW/interior.jpg" class="rounded-[1.5rem] w-full"></div>
                <div class="glass p-2 rounded-[2rem] overflow-hidden"><img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?q=80&w=600" class="rounded-[1.5rem] w-full"></div>
                <div class="glass p-2 rounded-[2rem] overflow-hidden"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=80&w=600" class="rounded-[1.5rem] w-full"></div>
                <div class="glass p-2 rounded-[2rem] overflow-hidden"><img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=600" class="rounded-[1.5rem] w-full"></div>
            </div>
        </div>
    </section>

    <section class="py-32 px-6 max-w-4xl mx-auto">
        <div class="glass p-12 md:p-20 rounded-[4rem] text-center">
            <h2 class="text-4xl font-bold italic mb-10">Guest <span class="text-sky-400">Feedback</span></h2>
            <form class="space-y-6">
                <input type="text" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none focus:border-sky-500 text-sm">
                <textarea placeholder="Your experience..." class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 outline-none focus:border-sky-500 h-40 text-sm"></textarea>
                <button type="submit" class="px-16 py-6 bg-white text-black font-black rounded-full uppercase text-[10px] tracking-widest hover:bg-sky-500 hover:text-white transition-all">Submit Review</button>
            </form>
        </div>
    </section>

    <div x-show="open" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/90 backdrop-blur-2xl" @click.away="open = false">
        <div class="relative w-full max-w-5xl glass rounded-[4rem] overflow-hidden flex flex-col md:flex-row shadow-2xl">
            <button @click="open = false" class="absolute top-10 right-10 text-zinc-500 text-4xl"><i class="fas fa-times-circle"></i></button>
            <div class="md:w-1/2 h-80 md:h-auto"><img :src="imgSrc" class="w-full h-full object-cover"></div>
            <div class="md:w-1/2 p-16 flex flex-col justify-center text-left">
                <h3 class="text-5xl font-bold italic uppercase tracking-tighter" x-text="imgTitle"></h3>
                <div class="h-[2px] w-12 bg-sky-500 my-8"></div>
                <p class="text-zinc-500 text-lg mb-10" x-text="desc"></p>
                <div class="text-6xl font-bold" x-text="imgPrice"></div>
            </div>
        </div>
    </div>

    <script>
        const images = [
            'https://i.ibb.co/60sfv1rW/interior.jpg',
            'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=80&w=1000'
        ];
        let cur = 0;
        const bg = document.getElementById('hero-bg');
        function rotate() {
            bg.style.backgroundImage = `url('${images[cur]}')`;
            cur = (cur + 1) % images.length;
        }
        rotate(); setInterval(rotate, 6000);
    </script>
</body>
</html>
