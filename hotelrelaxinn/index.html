<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Relax Inn | Elite Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap');
        
        :root { --sky: #0ea5e9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; scroll-behavior: smooth; overflow-x: hidden; }

        /* HERO BG ROTATION */
        #hero-bg {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.3) contrast(1.1);
            transition: background-image 2s ease-in-out;
        }

        /* THE INSANE GLOW JUMP */
        @keyframes eliteJump {
            0%, 100% { transform: translateY(0); filter: brightness(1); }
            50% { transform: translateY(-35px); filter: brightness(1.5) drop-shadow(0 0 30px var(--sky)); }
        }
        .jump-text { font-family: 'Cormorant Garamond', serif; display: flex; justify-content: center; gap: 0.15rem; }
        .jump-text span { display: inline-block; animation: eliteJump 3.5s infinite ease-in-out; }
        .space-block { width: 2.5rem; }
        .jump-text span:nth-child(n) { animation-delay: calc(var(--i) * 0.1s); }

        /* GLASS DESIGN */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.07); transition: 0.5s; }
        .glass:hover { border-color: var(--sky); background: rgba(255, 255, 255, 0.07); transform: translateY(-5px); }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="{ open: false, imgSrc: '', imgTitle: '', imgPrice: '', desc: '' }">

    <div id="hero-bg"></div>

    <header class="relative h-screen flex flex-col items-center justify-center text-center px-4">
        <div class="relative z-10">
            <div class="jump-text text-6xl md:text-[10rem] font-bold italic tracking-tighter leading-none">
                <span style="--i:1">H</span><span style="--i:2">o</span><span style="--i:3">t</span><span style="--i:4">e</span><span style="--i:5">l</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:6">R</span><span class="text-sky-400" style="--i:7">e</span><span class="text-sky-400" style="--i:8">l</span><span class="text-sky-400" style="--i:9">a</span><span class="text-sky-400" style="--i:10">x</span>
                <div class="space-block"></div>
                <span class="text-sky-400" style="--i:11">I</span><span class="text-sky-400" style="--i:12">n</span><span class="text-sky-400" style="--i:13">n</span>
            </div>
            <p class="mt-10 text-zinc-500 uppercase tracking-[1em] text-[8px] md:text-xs font-black">The Apex of Culinary Sophistication</p>
            <a href="#menu" class="mt-16 px-14 py-5 border border-white/10 rounded-full hover:bg-sky-500 transition-all uppercase tracking-widest text-[10px] font-black inline-block">Explore Full Menu</a>
        </div>
    </header>

    <section id="menu" class="py-32 px-6 max-w-7xl mx-auto" x-data="{ tab: 'mutton' }">
        <div class="text-center mb-20">
            <h2 class="text-6xl font-bold italic tracking-tighter mb-8">The <span class="text-sky-400">Master</span> List</h2>
            <div class="flex flex-wrap justify-center gap-4 border-b border-white/5 pb-6">
                <button @click="tab = 'mutton'" :class="tab === 'mutton' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="px-6 pb-2 uppercase tracking-widest text-[10px] font-black">Mutton Selection</button>
                <button @click="tab = 'veg'" :class="tab === 'veg' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="px-6 pb-2 uppercase tracking-widest text-[10px] font-black">Royal Vegetarian</button>
                <button @click="tab = 'tandoor'" :class="tab === 'tandoor' ? 'text-sky-400 border-b-2 border-sky-400' : 'text-zinc-600'" class="px-6 pb-2 uppercase tracking-widest text-[10px] font-black">Tandoor & Starters</button>
            </div>
        </div>

        <div x-show="tab === 'mutton'" x-transition class="grid md:grid-cols-3 gap-6">
            <div @click="open = true; imgSrc = 'https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=1000'; imgTitle = 'Executive Mutton Thali'; imgPrice = '₹280'; desc = 'Clay-pot style mutton served with steaming rice and dalma.'" class="glass p-6 rounded-[2.5rem] cursor-pointer group">
                <img src="https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=400" class="w-full h-48 object-cover rounded-[2rem] mb-6 group-hover:scale-105 transition-all">
                <h3 class="text-xl font-bold uppercase">Executive Thali</h3>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-zinc-500 text-xs uppercase font-bold">Signature</span>
                    <span class="text-sky-400 font-bold">₹280</span>
                </div>
            </div>
        </div>
    </section>

    <section id="gallery" class="py-32 bg-white/5">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-center text-xs tracking-[1.5em] text-zinc-500 uppercase mb-20">The Visual Archive</h2>
            <div class="columns-1 md:columns-4 gap-4 space-y-4">
                <div class="glass p-2 rounded-[2rem] overflow-hidden group">
                    <img src="https://i.ibb.co/60sfv1rW/interior.jpg" class="rounded-[1.5rem] w-full hover:scale-110 transition duration-700">
                </div>
                </div>
        </div>
    </section>

    <section id="feedback" class="py-32 px-6 max-w-4xl mx-auto">
        <div class="glass p-12 md:p-20 rounded-[3rem] text-center shadow-2xl">
            <h2 class="text-4xl font-bold italic mb-4 uppercase tracking-tighter">Guest <span class="text-sky-400">Feedback</span></h2>
            <p class="text-zinc-500 mb-10 uppercase tracking-[0.5em] text-[10px]">Your experience matters</p>
            
            <form action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <input type="text" name="name" required placeholder="Your Name" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none focus:border-sky-500 transition-all text-sm">
                    <input type="email" name="email" required placeholder="Email Address" 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 outline-none focus:border-sky-500 transition-all text-sm">
                </div>
                <textarea name="message" required placeholder="Tell us about your visit..." 
                          class="w-full bg-white/5 border border-white/10 rounded-3xl p-6 outline-none focus:border-sky-500 h-40 transition-all text-sm"></textarea>
                
                <button type="submit" class="w-full md:w-auto px-16 py-5 bg-sky-500 text-white font-black rounded-full uppercase text-[10px] tracking-widest hover:bg-sky-400 transition-all">
                    Submit Feedback
                </button>
            </form>
        </div>
    </section>

    <div class="fixed bottom-10 left-1/2 -translate-x-1/2 flex items-center gap-10 px-12 py-6 glass rounded-full z-[100] border-white/20 shadow-2xl">
        <a href="tel:+918114674620" class="text-xl text-zinc-400 hover:text-sky-400"><i class="fas fa-phone-alt"></i></a>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <a href="https://wa.me/918114674620" class="text-4xl text-green-500 hover:scale-110 transition-transform"><i class="fab fa-whatsapp"></i></a>
        <div class="h-8 w-[1px] bg-white/10"></div>
        <a href="https://maps.google.com" target="_blank" class="text-xl text-zinc-400 hover:text-red-500"><i class="fas fa-location-arrow"></i></a>
    </div>

    <div x-show="open" x-cloak 
         x-transition:enter="transition ease-out duration-300"
         class="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl" @click.away="open = false">
        <div class="relative w-full max-w-5xl glass rounded-[4rem] overflow-hidden flex flex-col md:flex-row shadow-[0_0_100px_rgba(14,165,233,0.3)]">
            <button @click="open = false" class="absolute top-10 right-10 text-zinc-500 text-4xl z-50"><i class="fas fa-times-circle"></i></button>
            <div class="md:w-1/2 h-80 md:h-auto"><img :src="imgSrc" class="w-full h-full object-cover"></div>
            <div class="md:w-1/2 p-16 flex flex-col justify-center">
                <h3 class="text-5xl font-bold italic uppercase tracking-tighter" x-text="imgTitle"></h3>
                <p class="text-zinc-500 text-lg my-10" x-text="desc"></p>
                <div class="text-6xl font-bold" x-text="imgPrice"></div>
            </div>
        </div>
    </div>

    <script>
        const images = [
            'https://i.ibb.co/60sfv1rW/interior.jpg',
            'https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=1000'
        ];
        let cur = 0;
        const bg = document.getElementById('hero-bg');
        function rotate() {
            bg.style.backgroundImage = `url('${images[cur]}')`;
            cur = (cur + 1) % images.length;
        }
        rotate(); setInterval(rotate, 6000);
    </script>
</body>
</html>
